<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opdater attraktion – Turistguide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <a href="/" class="navbar-brand">🗺 Turistguide</a>
    <div class="navbar-links">
        <a href="/">Forside</a>
        <a href="/attractions">Attraktioner</a>
        <a href="/attractions/add" class="btn btn-sm">+ Tilføj</a>
    </div>
</nav>

<main class="container">

    <a href="/attractions" class="back-link">← Alle attraktioner</a>

    <div class="form-card" style="max-width: 600px; margin: 0 auto;">
        <h1 style="text-align:left; margin-bottom: var(--space-6);">Opdater attraktion</h1>

        <form th:action="@{/attractions/update}" th:object="${attraction}" method="post">

            <div class="form-group">
                <label for="oldName">Vælg attraktion <span class="required">*</span></label>
                <select id="oldName" name="oldName" required>
                    <option value="" disabled selected>Vælg attraktion...</option>
                    <option th:each="a : ${attractions}" th:value="${a.name}" th:text="${a.name}"></option>
                </select>
            </div>

            <div class="form-group">
                <label for="name">Nyt navn <span class="required">*</span></label>
                <input type="text" id="name" th:field="*{name}" placeholder="Nyt navn..." required/>
            </div>

            <div class="form-group">
                <label for="description">Ny beskrivelse <span class="required">*</span></label>
                <textarea id="description" th:field="*{description}" placeholder="Ny beskrivelse..." required></textarea>
            </div>

            <div class="form-actions">
                <a href="/attractions" class="btn btn-ghost">Annuller</a>
                <button type="submit" class="btn">Opdater</button>
            </div>

        </form>
    </div>

</main>

<footer class="site-footer">
    <p>Turistguide &copy; 2025 &nbsp;·&nbsp; <a href="mailto:turistguide@eksempel.dk">turistguide@eksempel.dk</a></p>
</footer>

</body>
</html>
