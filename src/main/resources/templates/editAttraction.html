<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rediger attraktion – Turistguide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <a href="/" class="navbar-brand">🗺 Turistguide</a>
    <div class="navbar-links">
        <a href="/">Forside</a>
        <a href="/attractions">Attraktioner</a>
        <a href="/attractions/add" class="btn btn-sm">+ Tilføj</a>
    </div>
</nav>

<main class="container">

    <a href="/attractions" class="back-link">← Alle attraktioner</a>

    <div class="form-card" style="max-width: 600px; margin: 0 auto;">
        <h1 style="text-align:left; margin-bottom: var(--space-6);">Rediger attraktion</h1>

        <form th:action="@{/attractions/update}" th:object="${attraction}" method="post">

            <input type="hidden" name="oldName" th:value="${oldName}"/>

            <div class="form-group">
                <label for="name">Navn</label>
                <input type="text" id="name" th:field="*{name}" readonly
                       style="background: var(--surface-raised); cursor: not-allowed;"/>
                <span class="field-hint">Navn kan ikke ændres.</span>
            </div>

            <div class="form-group">
                <label for="description">Beskrivelse <span class="required">*</span></label>
                <textarea id="description" th:field="*{description}" required></textarea>
            </div>

            <div class="form-group">
                <label for="city">By <span class="required">*</span></label>
                <select id="city" th:field="*{city}" required>
                    <option value="" disabled>Vælg by...</option>
                    <option th:each="c : ${allCities}" th:value="${c}" th:text="${c}"></option>
                </select>
            </div>

            <div class="form-group">
                <label>Tags</label>
                <div class="checkbox-group">
                    <label th:each="tag : ${allTags}" class="checkbox-label">
                        <input type="checkbox" th:field="*{tags}" th:value="${tag}"/>
                        <span th:text="${tag}"></span>
                    </label>
                </div>
            </div>

            <div class="form-actions">
                <a href="/attractions" class="btn btn-ghost">Annuller</a>
                <button type="submit" class="btn">Gem ændringer</button>
            </div>

        </form>
    </div>

</main>

<footer class="site-footer">
    <p>Turistguide &copy; 2025 &nbsp;·&nbsp; <a href="mailto:turistguide@eksempel.dk">turistguide@eksempel.dk</a></p>
</footer>

</body>
</html>
